        /*---------------- 페이징 함수 ---------------- */
        function pageInsert(val, selIndex) {
            pagenation.empty();     // 페이징 목록 초기화 실시

            // 생성된 테이블 tr 개수 확인 >> 페이징 처리 5개씩 목록 자름
            var startIndex = val;                       // 생성 시작 페이지    		
            var endIndex = Object.keys(dataList).length; // 배열에 있는 길이 확인

            // tr 개수에 따라 페이징 해야할 개수 확인
            var pageCount = 0;
            var pagePlus = 0;

            if(endIndex > pageList){                         // tr 행 개수가 5 이상인 경우
                pageCount = Math.floor(endIndex / pageList); //생성될 페이지 수
                pagePlus = endIndex % pageList;              //추가 나머지 자식 수
            
                if(pagePlus > 0){                            //추가 자식수가 있는경우 >> 페이지 추가
                    pageCount = pageCount + 1;
                }
            }

            // 생성될 페이지 번호가 전체 생성되야하는 길이보다 크거나 작은지 확인
            if (startIndex > pageCount) {       //길이 초과 시 기존꺼로 다시 저장
                startIndex = page;
            } else if (startIndex < 0) {        //길이 미만 시 기존꺼로 다시 저장
                startIndex = page;
            } else {
                page = startIndex;
            } 
            if (selIndex == undefined || selIndex < 1 || selIndex > pageCount) selIndex = startIndex;

            // 동적 ul 페이징 처리
            if(pageCount == 1){ 
                var insertUl = "<li class='page-item'>";
                insertUl += insertUl + "<a class='page-link' href='javascript:void(0)' onclick = 'newPage(1);'>"
                insertUl += insertUl + i;
                insertUl += insertUl + "</a></li>";
                pagenation.append(insertUl);  

            } else if(pageCount >= 2){

                if (startIndex > 1) {
                    // 이전 페이지 추가
                    var insertSTR = "<li class='page-item'>";
                    insertSTR = insertSTR + "<a class='page-link' href='javascript:void(0)' onclick = 'newPage("+"-1"+");'>";
                    insertSTR = insertSTR + "이전";
                    insertSTR = insertSTR + "</a></li>";
                    pagenation.append(insertSTR);
                }

                // 페이지 추가
                var count = 1;
                for(var i=startIndex; i<=pageCount; i++){
                    if(count > pageMax){            //최대로 생성될 페이지 개수가 된 경우 
                        page = i - pageMax;         //생성된 페이지 초기값 저장 (초기 i값 4 탈출 인경우 >> 1값 저장)
                        break;  
                    }
                    var insertUl = "<li class='page-item' data-idx='"+i+"'>";
                    insertUl = insertUl + "<a class='page-link' href='javascript:void(0)' onclick = 'newPage("+i+");'>";
                    insertUl = insertUl + String(i);
                    insertUl = insertUl + "</a></li>";
                    newelem = pagenation.append(insertUl);
                    count ++;
                }

                if (pageCount > (i - 1)) {
                    // 다음 페이지 추가
                    var insertEND = "<li class='page-item'>";
                    insertEND = insertEND + "<a class='page-link' href='javascript:void(0)' onclick = 'newPage("+"0"+");'>";
                    insertEND = insertEND + "다음";
                    insertEND = insertEND + "</a></li>";
                    pagenation.append(insertEND);
                }
            }

            tbody.empty();   //tbody tr 전체 삭제 실시
            
            // newPage(startIndex);    // 새롭게 페이지 목록 리스트 처리 실시간
            newPage(selIndex);
        }
        
        /*-------- tbody tr 동적 삽입 이벤트 수행 함수 -------- */
        function newPage(pageCurrent) {
            
            if(pageCurrent == -1){                      // 이전 페이지  
                tbody.empty();  //tbody tr 초기화
                var newIdx = page - pageMax;
                var selIdx = newIdx + (pageMax - 1);

                pageInsert(newIdx, selIdx); //표시될 페이지 번호 전송

            } else if(pageCurrent == 0){                 // 다음 페이지
                tbody.empty(); 
                var newIdx = page + pageMax;

                pageInsert(newIdx);

            } else {                                     // 일반 테이블 목록 리스트 갱신
                tbody.empty();

                // 현재 페이지 표시
                $(".page-item").removeClass("sel");
                $(".page-item[data-idx="+pageCurrent+"]").addClass("sel");

                idx = (pageCurrent * pageList) - pageList;  // 저장된 idx 에서 페이지 수를 곱해서 새로운 idx 지정
                
                var checkCount = 1;
                for(var i=idx; i<Object.keys(dataList).length; i++){   //tbody > tr 데이터 추가
                    
                    //한페이지에 표시될 목록을 초과한 경우
                    if(checkCount > pageList){  
                        return;
                    }

                    // 동적 리스트 append
                    if (isMobile) {
                        tbody.append('<tr><td class="col1"><a href="'+ dataList[i].content+ '" target ="_blank">' + dataList[i].title + '</a><div class="col2">'+ dataList[i].date+'</div></td></tr>'); 
                    } else {
                        tbody.append('<tr><td class="col1"><a href="'+ dataList[i].content+ '" target ="_blank">' + dataList[i].title + '</a></td><td class="col2">'+ dataList[i].date+'</td></tr>'); 
                    }
                    

                    // 카운트 횟수 증가 		
                    checkCount ++;	
                }							
            }

            // $('html').scrollTop(180);
        }

        /*-------- 상단 썸네일 (최근 기사 4개) -------- */

                }
            }
        }
    </script>
